name: Sync Upstream & Notify

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/tulir/whatsmeow.git
          git fetch upstream

      - name: Detect upstream changes
        id: check
        run: |
          COMMITS_AHEAD=$(git rev-list --count main..upstream/main)
          if [ "$COMMITS_AHEAD" -gt 0 ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "commits=$COMMITS_AHEAD" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "commits=0" >> $GITHUB_OUTPUT
          fi
          echo "Commits à frente do upstream: $COMMITS_AHEAD"

      - name: Get upstream changes info
        if: steps.check.outputs.changed == 'true'
        id: changes
        run: |
          LAST_COMMIT=$(git log -1 --format="%h - %s" upstream/main)
          echo "commits=${{ steps.check.outputs.commits }}" >> $GITHUB_OUTPUT
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          echo "=== Mudanças detectadas ==="
          echo "Commits à frente: ${{ steps.check.outputs.commits }}"
          echo "Último commit: $LAST_COMMIT"
          echo ""
          echo "Commits que serão sincronizados:"
          git log --oneline main..upstream/main | head -10

      - name: Notify Telegram
        if: steps.check.outputs.changed == 'true'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          thread_id: 5
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🔄 *Atualização detectada no upstream!*

            Repositório: *${{ github.repository }}*

            📊 *Estatísticas:*
            • Commits à frente: *${{ steps.changes.outputs.commits }}*
            • Último commit: `${{ steps.changes.outputs.last_commit }}`

            ⚠️ *Ação necessária:*
            Faça o sync manualmente no GitHub ou localmente.

            🔗 [Ver comparação](https://github.com/${{ github.repository }}/compare/main...tulir/whatsmeow:main)
